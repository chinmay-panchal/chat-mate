name: chat_mate
description: "Minimal 1-on-1 watch-together video call app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^1.3.1
  web_socket_channel: ^2.4.0
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  video_player: ^2.9.2
  file_picker: ^8.1.2

dependency_overrides:        # ← must be its own top-level key
  flutter_webrtc:
    path: ./flutter_webrtc_local

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true